];
nodes.forEach(n => {
  const forceRefresh = ATC_NODES.includes(n.id) && (!nodeNotes[n.id] || nodeNotes[n.id].length < 40);
  if ((nodeNotes[n.id] === undefined || forceRefresh) && DEFAULT_NOTES[n.id]) {

const byId = {};
nodes.forEach(n => byId[n.id]=n);

function svgEl(tag, attrs, parent){
  const e = document.createElementNS(svgNS, tag);
  for(const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}
function nW(n){ return n.w||NW; }
function nH(n){ return n.h||NH; }
function nCX(n){ return n.x+nW(n)/2; }
function nBot(n){ return n.y+nH(n); }

function buildEdges(){
  const edges=[];
  nodes.forEach(n => {
    (n.req||[]).forEach(r => {
      if(r==='—') return;
      if(byId[r]) edges.push({from:r, to:n.id});
    });
  });
  return edges;
}

const joinSet = new Set();
nodes.forEach(n => {
  const vr = (n.req||[]).filter(r=>r!=='—');
  if(vr.length>1) joinSet.add(n.id);
});

  const gE=svgEl('g',{'id':'gEdges'},gw);
  const edges=buildEdges();
  edges.forEach(e=>{
    const s=byId[e.from], d=byId[e.to];
    if(!s||!d) return;
    const sHide=nodeFilter!=='all'&&s.type!==nodeFilter;
    const dHide=nodeFilter!=='all'&&d.type!==nodeFilter;
    if(sHide&&dHide) return;
    const sx=nCX(s), sy=nBot(s), dx=nCX(d), dy=d.y;
    const mY=(sy+dy)/2;
    const isJ=joinSet.has(e.to);
    const p=svgEl('path',{
      d:`M${sx},${sy} C${sx},${mY} ${dx},${mY} ${dx},${dy}`,
      fill:'none', stroke:isJ?joinCol:edgeCol, 'stroke-width':isJ?'1.5':'1',
      'stroke-dasharray':isJ?'4,3':'none',
      'marker-end':'url(#arr)',
      'data-from':e.from, 'data-to':e.to,
      style:'pointer-events:stroke',
    },gE);
    // Edge hover tooltip
    p.addEventListener('mouseenter', ev=>{
      const tip=document.getElementById('edgeTip');
      tip.textContent=`${e.from}  →  ${e.to}`;
      tip.style.display='block';
      tip.style.left=(ev.clientX+12)+'px'; tip.style.top=(ev.clientY-6)+'px';
    });
    p.addEventListener('mousemove', ev=>{
      const tip=document.getElementById('edgeTip');
      tip.style.left=(ev.clientX+12)+'px'; tip.style.top=(ev.clientY-6)+'px';
    });
    p.addEventListener('mouseleave',()=>{ document.getElementById('edgeTip').style.display='none'; });
  });

  // Nodes
  const gN=svgEl('g',{'id':'gNodes'},gw);
  nodes.forEach(n=>{
    const hide=nodeFilter!=='all'&&n.type!==nodeFilter;
    const g=svgEl('g',{'data-id':n.id,opacity:hide?'0.1':'1',style:'cursor:pointer'},gN);
    g.addEventListener('click', ev=>{ ev.stopPropagation(); selectNode(n.id); });
    g.addEventListener('mouseenter', ()=>highlightNode(n.id));
    g.addEventListener('mouseleave', ()=>clearHighlight());

    const color=TC[n.type]||'#94a3b8';
    const w=nW(n), h=nH(n), x=n.x, y=n.y;
    const isSel=n.id===selected;
    const hasNote=!!nodeNotes[n.id];

    // Shadow for selected
    if(isSel){
      svgEl('rect',{x:x-2,y:y-2,width:w+4,height:h+4,rx:'7',fill:'none',
        stroke:color,'stroke-width':'2',opacity:'0.7'},g);
    }
    // Card background
    svgEl('rect',{x,y,width:w,height:h,rx:'5',fill:bg,stroke:border,'stroke-width':'1'},g);
    // Left accent bar
    svgEl('rect',{x,y:y+3,width:3,height:h-6,rx:'1.5',fill:color},g);
    // Notes dot (top-right)
    if(hasNote){
      svgEl('circle',{cx:x+w-5,cy:y+5,r:'3',fill:color,opacity:'0.75'},g);
    }
    // JOIN badge
    if(joinSet.has(n.id)){
      svgEl('rect',{x:x+w-26,y:y+h-14,width:24,height:12,rx:'3',fill:'rgba(251,191,36,.15)',stroke:'rgba(251,191,36,.4)','stroke-width':'1'},g);
      const jt=svgEl('text',{x:x+w-14,y:y+h-5,'font-size':'7','font-weight':'800',fill:'#fbbf24','text-anchor':'middle'},g);
      jt.textContent='JOIN';
    }
    // ID label
    const idT=svgEl('text',{x:x+10,y:y+13,'font-size':'9','font-weight':'700','font-family':'monospace',fill:color,'letter-spacing':'0.2'},g);
    idT.textContent=n.id.length>22?n.id.slice(0,22):n.id;
    // Main label
    const mlT=svgEl('text',{x:x+10,y:y+26,'font-size':'10','font-weight':'600',fill:textCol},g);
    mlT.textContent=n.label.length>24?n.label.slice(0,24):n.label;
    // Sub label (only for taller nodes)
    if(h>=NH && n.sub){
      const maxC=Math.floor((w-18)/5.4);
      const slT=svgEl('text',{x:x+10,y:y+39,'font-size':'9',fill:subCol},g);
      slT.textContent=n.sub.length>maxC?n.sub.slice(0,maxC)+'…':n.sub;
    }
  });
}

// ── VIEW ──────────────────────────────────────────────────────────────────
function applyVp(){
  document.getElementById('gWorld').setAttribute('transform',
    `translate(${vp.x},${vp.y}) scale(${vp.scale})`);
  localStorage.setItem(VP_KEY, JSON.stringify({x:vp.x,y:vp.y,scale:vp.scale}));
  positionNote();
}

function resetView(){ vp.x=60; vp.y=50; vp.scale=1; applyVp(); }

// ── HOVER HIGHLIGHT ────────────────────────────────────────────────────────
function highlightNode(hoverId){
  const upstream=new Set(), downstream=new Set(), upEdges=[], downEdges=[];
  document.querySelectorAll('#gEdges > path').forEach(p=>{
    const f=p.dataset.from, t=p.dataset.to;
    if(t===hoverId){ upstream.add(f); upEdges.push(p); }
    if(f===hoverId){ downstream.add(t); downEdges.push(p); }
  });
  // Dim all nodes and edges
  document.querySelectorAll('#gNodes > g').forEach(g=>{
    const id=g.dataset.id;
    g.style.opacity=(id===hoverId||upstream.has(id)||downstream.has(id))?'1':'0.08';
  });
  document.querySelectorAll('#gEdges > path').forEach(p=>{ p.style.opacity='0.04'; p.style.stroke=''; p.style.strokeWidth=''; });
  // Highlight upstream (amber) and downstream (green)
  upEdges.forEach(p=>{ p.style.opacity='1'; p.style.stroke='#fbbf24'; p.style.strokeWidth='2'; });
  downEdges.forEach(p=>{ p.style.opacity='1'; p.style.stroke='#34d399'; p.style.strokeWidth='2'; });
}

function clearHighlight(){
  document.querySelectorAll('#gNodes > g').forEach(g=>{ g.style.opacity=''; });
  document.querySelectorAll('#gEdges > path').forEach(p=>{ p.style.opacity=''; p.style.stroke=''; p.style.strokeWidth=''; });
}

// Build a reverse-lookup map: which nodes require THIS node
const requiredBy = {};
nodes.forEach(n=>{
  (n.req||[]).forEach(r=>{
    if(r==='—') return;
    if(!requiredBy[r]) requiredBy[r]=[];
    requiredBy[r].push(n.id);
  });
});

// ── NOTE OVERLAY ──────────────────────────────────────────────────────────
function positionNote(){
  const ov=document.getElementById('noteOverlay');
  if(!selected){ ov.style.display='none'; return; }
  const n=byId[selected];
  if(!n){ ov.style.display='none'; return; }
  const svgEl2=document.getElementById('mainSvg');
  const svgR=svgEl2.getBoundingClientRect();
  const wrapR=document.getElementById('canvasWrap').getBoundingClientRect();
  const sx=(svgR.left-wrapR.left)+vp.x+n.x*vp.scale;
  const sy=(svgR.top-wrapR.top)+vp.y+(n.y+nH(n))*vp.scale+4;
  const ow=Math.max(nW(n)*vp.scale, 220);
  ov.style.left=Math.max(4,Math.min(sx,wrapR.width-ow-8))+'px';
  ov.style.top=Math.min(sy,wrapR.height-200)+'px';
  ov.style.width=ow+'px';
  ov.style.display='block';
  document.getElementById('noteLabel').textContent=selected;
  document.getElementById('noteTA').value=nodeNotes[selected]||'';
  // Connection info
  const n2=byId[selected];
  const ci=document.getElementById('connInfo');
  const validReq=(n2.req||[]).filter(r=>r!=='—');
  const feeds=requiredBy[selected]||[];
  let ciHtml='';
  if(validReq.length){
    ciHtml+=`<span style="color:#fbbf24;font-weight:700">← REQUIRES:</span> `
      +validReq.map(r=>`<span style="color:#fbbf24;font-family:monospace;opacity:.85">${r}</span>`).join(' + ')+'<br>';
  }
  if(feeds.length){
    ciHtml+=`<span style="color:#34d399;font-weight:700">→ FEEDS INTO:</span> `
      +feeds.map(f=>`<span style="color:#34d399;font-family:monospace;opacity:.85">${f}</span>`).join(' · ');
  }
  ci.innerHTML=ciHtml||'<span style="color:#475569">no connections</span>';
  ci.style.display='block';
}

function selectNode(id){
  if(selected===id){ closeNote(); return; }
  selected=id;
  render(); applyVp();
}

function closeNote(){
  selected=null;
  render(); applyVp();
  document.getElementById('noteOverlay').style.display='none';
}

let _noteBeforeEdit = null;
document.getElementById('noteTA').addEventListener('focus',()=>{
  _noteBeforeEdit = document.getElementById('noteTA').value;
});
document.getElementById('noteTA').addEventListener('blur',()=>{
  if(!selected) return;
  const after = document.getElementById('noteTA').value;
  if(_noteBeforeEdit !== after){
    undoStack.push({nodeId:selected, before:_noteBeforeEdit, after});
    if(undoStack.length > 50) undoStack.shift();
  }
  _noteBeforeEdit = null;
});
let _saveTimer;
document.getElementById('noteTA').addEventListener('input',()=>{
  if(!selected) return;
  nodeNotes[selected]=document.getElementById('noteTA').value;
  localStorage.setItem(NOTES_KEY,JSON.stringify(nodeNotes));
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const s=document.getElementById('saveStatus');
    s.textContent='saved '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    s.style.color='#34d399';
    setTimeout(()=>{ s.textContent='auto-save on'; s.style.color='#475569'; }, 2200);
  }, 600);
});

// ── PAN / ZOOM ────────────────────────────────────────────────────────────
const mainSvg=document.getElementById('mainSvg');

mainSvg.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    const r=mainSvg.getBoundingClientRect();
    const cx=e.clientX-r.left, cy=e.clientY-r.top;
    const f=e.deltaY<0?1.10:0.91;
    const ns=Math.max(0.07,Math.min(5,vp.scale*f));
    vp.x=cx-(cx-vp.x)*ns/vp.scale;
    vp.y=cy-(cy-vp.y)*ns/vp.scale;
    vp.scale=ns;
  } else {
    vp.x-=e.deltaX;
    vp.y-=e.deltaY;
  }
  applyVp();
},{passive:false});

mainSvg.addEventListener('pointerdown',e=>{
  if(e.target===mainSvg||e.target.tagName==='svg'){
    panStart={x:e.clientX-vp.x, y:e.clientY-vp.y};
    mainSvg.setPointerCapture(e.pointerId);
  }
});
mainSvg.addEventListener('pointermove',e=>{
  if(!panStart) return;
  vp.x=e.clientX-panStart.x;
  vp.y=e.clientY-panStart.y;
  applyVp();
});
mainSvg.addEventListener('pointerup',()=>{ panStart=null; });
mainSvg.addEventListener('click',e=>{
  if(e.target===mainSvg) closeNote();
});

// Touch pinch-to-zoom
let _tt={}, _pd=0;
mainSvg.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{ _tt[t.identifier]={x:t.clientX,y:t.clientY}; });
  const ids=Object.keys(_tt);
  if(ids.length===2){ const a=_tt[ids[0]],b=_tt[ids[1]]; _pd=Math.hypot(b.x-a.x,b.y-a.y); }
},{passive:false});
mainSvg.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0], prev=_tt[t.identifier];
    if(prev){ vp.x+=t.clientX-prev.x; vp.y+=t.clientY-prev.y; applyVp(); }
    _tt[t.identifier]={x:t.clientX,y:t.clientY};
  } else if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const nd=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    if(_pd>0){
      const cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
      const r=mainSvg.getBoundingClientRect();
      const lx=cx-r.left, ly=cy-r.top;
      const f=nd/_pd;
      const ns=Math.max(0.07,Math.min(5,vp.scale*f));
      vp.x=lx-(lx-vp.x)*ns/vp.scale;
      vp.y=ly-(ly-vp.y)*ns/vp.scale;
      vp.scale=ns; applyVp();
    }
    _pd=nd;
    _tt[t0.identifier]={x:t0.clientX,y:t0.clientY};
    _tt[t1.identifier]={x:t1.clientX,y:t1.clientY};
  }
},{passive:false});
mainSvg.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>delete _tt[t.identifier]);
  if(Object.keys(_tt).length<2) _pd=0;
},{passive:false});

// ── FILTER ────────────────────────────────────────────────────────────────
function setFilter(f,btn){
  nodeFilter=f;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(); applyVp();
}

// ── DAY MODE ──────────────────────────────────────────────────────────────
function toggleDay(){
  dayMode=!dayMode;
  document.getElementById('dayBtn').classList.toggle('day',dayMode);
  document.body.style.background=dayMode?'#f1f5f9':'#0a0e1a';
  document.getElementById('legend').style.background=dayMode?'rgba(248,250,252,.95)':'rgba(10,14,26,.92)';
  document.getElementById('legend').style.color=dayMode?'#475569':'#64748b';
  document.getElementById('hint').style.color=dayMode?'#94a3b8':'#334155';
  // Update arrow marker color
  document.querySelector('#arr path').setAttribute('fill', dayMode?'rgba(0,0,0,.2)':'rgba(255,255,255,.22)');
  document.getElementById('noteOverlay').style.background=dayMode?'rgba(248,250,252,.97)':'rgba(10,14,26,.97)';
  document.getElementById('noteTA').style.color=dayMode?'#1e293b':'#e2e8f0';
  render(); applyVp();
}

// ── SAVE HTML — bakes current notes into the file itself ──────────────────
function saveHTML(){
  const entries = Object.entries(nodeNotes)
    .map(([k,v]) => `  ${JSON.stringify(k)}:${JSON.stringify(v)}`)
    .join(',\n');
  const newNotesBlock =
    `// __NOTES_BLOCK_START__\nconst DEFAULT_NOTES = {\n${entries}\n};\n// __NOTES_BLOCK_END__`;
  const newVp =
    `let _savedVp = /*__VP__*/${JSON.stringify({x:Math.round(vp.x),y:Math.round(vp.y),scale:Math.round(vp.scale*1000)/1000})}/*__VP_END__*/;`;

  // Always prepend DOCTYPE — outerHTML drops it
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

  // Replace notes block between stable markers — works on any saved version
  html = html.replace(
    /\/\/ __NOTES_BLOCK_START__[\s\S]*?\/\/ __NOTES_BLOCK_END__/,
    newNotesBlock
  );
  // Replace VP between stable markers — works on any saved version
  html = html.replace(
    /let _savedVp = \/\*__VP__\*\/[\s\S]*?\/\*__VP_END__\*\/;/,
    newVp
  );

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ENG1_FIRE_FLOWGRAPH_V1_SAVED.html';
  a.click();
  const s = document.getElementById('saveStatus');
  s.textContent = 'HTML saved ✓'; s.style.color = '#34d399';
  setTimeout(()=>{ s.textContent='auto-save on'; s.style.color='#475569'; }, 2500);
}

// ── UNDO — revert last note change ────────────────────────────────────────
function undoLast(){
  const entry=undoStack.pop();
  if(!entry){
    const s=document.getElementById('saveStatus');
    s.textContent='nothing to undo'; s.style.color='#f87171';
    setTimeout(()=>{ s.textContent='auto-save on'; s.style.color='#475569'; }, 1800);
    return;
  }
  nodeNotes[entry.nodeId]=entry.before;
  localStorage.setItem(NOTES_KEY,JSON.stringify(nodeNotes));
  if(selected===entry.nodeId) document.getElementById('noteTA').value=entry.before||'';
  render(); applyVp();
  const s=document.getElementById('saveStatus');
  s.textContent=`undid: ${entry.nodeId}`; s.style.color='#fbbf24';
  setTimeout(()=>{ s.textContent='auto-save on'; s.style.color='#475569'; }, 2000);
}

// ── EXPORT JSON ───────────────────────────────────────────────────────────
function exportJSON(){
  const out={scenario:'ENG1_FIRE_AFTER_V1',exported:new Date().toISOString(),notes:{}};
  nodes.forEach(n=>{ if(nodeNotes[n.id]) out.notes[n.id]=nodeNotes[n.id]; });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='ENG1_FIRE_FLOWGRAPH_NOTES.json'; a.click();
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeNote();
  if((e.ctrlKey||e.metaKey)&&e.key==='0'){ e.preventDefault(); resetView(); }
  // Ctrl+Z when textarea not focused = undo last note change
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&document.activeElement!==document.getElementById('noteTA')){
    e.preventDefault(); undoLast();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────
render();
applyVp();
</script>
